<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Favor - Portfolio Hero</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'navy-dark': '#0f172a', // Slate-900 equivalent
            'army-green': '#948a66', // Muted olive/army green from image
            'brand-purple': '#7c3aed', // Vibrant purple for accents
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-typography">
    /* Custom spacing and typography rules for the hero headline */
    .hero-name {
      line-height: 0.9;
      letter-spacing: -0.02em;
    }
    .vertical-nav-item {
      letter-spacing: 0.1em;
      font-size: 0.65rem;
    }
  </style>
<style data-purpose="decorative-elements">
    /* Dot pattern styles */
    .dot-pattern {
      background-image: radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
      background-size: 12px 12px;
    }
  </style>
</head>
<body class="bg-[#a88a64] min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- BEGIN: Hero Card Container -->
<main class="relative w-full max-w-6xl aspect-[16/10] bg-army-green shadow-2xl overflow-hidden flex flex-row" data-purpose="portfolio-hero-container">
<!-- BEGIN: Left Sidebar -->
<aside class="w-1/4 bg-navy-dark relative z-20 flex flex-col justify-between py-12 px-8 text-white">
<!-- Logo Section -->
<div data-purpose="logo-container">
<div class="w-10 h-10 border-2 border-white flex items-center justify-center font-bold text-xl">
          F
        </div>
</div>
<!-- Navigation Links -->
<nav class="flex flex-col gap-4 uppercase font-bold text-white/70" data-purpose="sidebar-navigation">
<a class="vertical-nav-item hover:text-white transition-colors" href="#">ABOUT ME</a>
<a class="vertical-nav-item hover:text-white transition-colors" href="#">EXPERIENCE</a>
<a class="vertical-nav-item hover:text-white transition-colors" href="#">SERVICES</a>
<a class="vertical-nav-item hover:text-white transition-colors" href="#">PORTFOLIO</a>
<a class="vertical-nav-item hover:text-white transition-colors text-brand-purple" href="#">CONTACT ME</a>
<a class="vertical-nav-item hover:text-white transition-colors" href="#">BLOG</a>
</nav>
<!-- Bottom Decorative Dots (Left Side) -->
<div class="absolute bottom-4 -right-12 w-24 h-24 dot-pattern opacity-50 pointer-events-none" data-purpose="decorative-dots-left"></div>
</aside>
<!-- END: Left Sidebar -->
<!-- BEGIN: Main Content Area -->
<section class="flex-1 relative flex items-center" data-purpose="hero-content-section">
<!-- Headline: Favor (Overlapping Layout) -->
<div class="absolute left-[-5%] z-30 pointer-events-none w-full" data-purpose="hero-headline">
<h1 class="hero-name text-white text-[8vw] font-black uppercase flex flex-col"><span>FAVOR</span>
<span>ODEDELE</span></h1>
</div>
<!-- Right Side Content: Bio, CTA, and Image -->
<div class="ml-auto w-full h-full flex flex-col justify-center items-end pr-12 relative">
<!-- Bio and CTA (Floating Right) -->
<div class="z-40 text-right max-w-xs mb-32" data-purpose="hero-bio-cta">
<p class="text-white text-sm font-medium leading-relaxed mb-6">
            Programs Manager specializing in Education, Entrepreneurship, and Human Capacity Development.
          </p>
<a class="inline-block bg-white text-navy-dark px-6 py-2 text-xs font-bold uppercase tracking-widest hover:bg-brand-purple hover:text-white transition-all duration-300" data-purpose="download-cv-button" href="#">
            Download CV
          </a>
</div>
<!-- Professional Portrait -->
<!-- Note: Using provided image placeholder and positioning it to match the layout -->
<div class="absolute bottom-0 right-0 w-[70%] h-[90%] z-10 overflow-hidden" data-purpose="portrait-container">
<img alt="Portrait of Favor Odedele" class="w-full h-full object-cover object-center grayscale hover:grayscale-0 transition-all duration-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB369wgLpAHP2gliGqTRlkK6xwOtJK20gbsk4a65qJfHI02a8M8vUibYaNcZ3v3WWzJkSr_vrcsk6G9MhWzYu3QZcjOfOqWFYGbg3z6gvxNzSQcqA39JvjruOzs4hyJKlzNx6i1H-cpLePIQGxwF7tMxYQidApv5UXfYmWcuSvu_XpJUqaxMdWu-CoBDy1EkLNZbRQQtJNNB836nQYvKumPERhTY3ItAjMkfx7TJ-xwIw67AcZyjOiZeTzSACAJK_G5_9SOgkH6Pxk"/>
</div>
<!-- Decorative Dots (Right Side) -->
<div class="absolute bottom-20 -right-4 w-32 h-40 dot-pattern opacity-40 z-20 pointer-events-none" data-purpose="decorative-dots-right"></div>
<!-- Carousel Navigation Controls (Visual Aesthetic Only) -->
<div class="absolute bottom-12 right-12 flex gap-2 z-40" data-purpose="carousel-controls">
<button class="w-10 h-10 border border-white/50 text-white flex items-center justify-center hover:bg-white/20 transition-colors">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="w-10 h-10 border border-white/50 text-white flex items-center justify-center hover:bg-white/20 transition-colors">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</div>
</section>
<!-- END: Main Content Area -->
<!-- Bottom Dark Bar -->
<div class="absolute bottom-0 left-1/4 right-0 h-8 bg-navy-dark z-30" data-purpose="bottom-accents"></div>
</main>
<!-- END: Hero Card Container -->
</body></html>
